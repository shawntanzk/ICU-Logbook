<?xml version="1.0" encoding="UTF-8"?>
<!-- Android adaptive icon foreground layer.
     Background colour (#ffffff) is set in app.json.
     Safe zone is the inner 66% of the canvas — keep key elements there.
     Canvas: 1024x1024, safe zone: ~170..854 on each axis. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow" x="-25%" y="-100%" width="150%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background (adaptive icon layers handle their own bg) -->

  <!-- Dark rounded card (safe-zone sized) -->
  <rect x="112" y="200" width="800" height="624" rx="80" fill="#0F2744"/>

  <!-- ICU text -->
  <text
    x="512" y="530"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="260"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle">ICU</text>

  <!-- ECG line -->
  <polyline
    filter="url(#glow)"
    points="
      130,622
      256,622
      276,600
      296,622
      332,622
      350,642
      368,436
      386,642
      404,622
      438,622
      464,590
      492,622
      894,622"
    fill="none"
    stroke="#38BDF8"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- LOGBOOK label -->
  <text
    x="512" y="730"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="300"
    fill="#7DD3FC"
    text-anchor="middle"
    letter-spacing="16">LOGBOOK</text>
</svg>
